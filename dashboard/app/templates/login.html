<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Sign in · OPNsense Hub</title>
        <script>
            (() => {
                const storedTheme =
                    window.localStorage.getItem("opnsense-hub-theme");
                const preferredDark = window.matchMedia(
                    "(prefers-color-scheme: dark)",
                ).matches;
                const theme =
                    storedTheme === "dark" || storedTheme === "light"
                        ? storedTheme
                        : preferredDark
                          ? "dark"
                          : "light";
                document.documentElement.dataset.theme = theme;
            })();
        </script>
        {% if brand_logo_url %}
        <link rel="icon" href="{{ brand_logo_url }}" />
        {% endif %}
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
        />
        <link rel="stylesheet" href="/static/style.css" />
    </head>
    <body class="login">
        <div class="login-theme-toggle-wrap">
            <input
                class="theme-toggle-input"
                id="theme-toggle"
                type="checkbox"
                role="switch"
                aria-label="Toggle dark mode"
            />
            <label class="login-theme-toggle-button" for="theme-toggle">
                <span
                    class="login-theme-icon login-theme-icon-sun"
                    aria-hidden="true"
                >
                    <i class="fa-solid fa-sun"></i>
                </span>
                <span
                    class="login-theme-icon login-theme-icon-moon"
                    aria-hidden="true"
                >
                    <i class="fa-solid fa-moon"></i>
                </span>
            </label>
        </div>
        <section class="card">
            <h1>
                {% if brand_logo_url %}<img
                    class="login-brand-logo"
                    src="{{ brand_logo_url }}"
                    alt="OPNsense Hub logo"
                />{% else %}<i class="fa-solid fa-shield-halved brand-mark"></i
                >{% endif %} OPNsense Hub
            </h1>
            {% if error %}
            <div class="card warning">{{ error }}</div>
            {% endif %}
            <form
                action="/api/v1/auth/login"
                method="post"
                class="settings-form narrow-form"
            >
                <input
                    type="hidden"
                    name="csrf_token"
                    value="{{ csrf_token }}"
                />
                <label class="form-row"
                    >Email or username
                    <input name="email" type="text" required autofocus
                /></label>
                <label class="form-row"
                    >Password <input name="password" type="password" required
                /></label>
                <div class="login-actions">
                    <button class="button" type="submit">
                        <i class="fa-solid fa-right-to-bracket"></i> Sign in
                    </button>
                    {% if local_ad_login_enabled %}
                    <button
                        class="button secondary"
                        type="submit"
                        formaction="/auth/local-ad"
                    >
                        <i class="fa-solid fa-building-columns"></i> Sign in
                        with Local AD
                    </button>
                    {% endif %}
                </div>
            </form>
            {% if microsoft_login_enabled %}
            <div class="login-separator"><span>or</span></div>
            <div class="login-external-action">
                <a
                    class="button secondary"
                    id="microsoft-login-button"
                    href="/auth/microsoft/start"
                >
                    <i class="fa-brands fa-microsoft"></i> Sign in with
                    Microsoft 365
                </a>
            </div>
            <script>
                (function () {
                    const button = document.getElementById(
                        "microsoft-login-button",
                    );
                    const emailInput = document.querySelector(
                        'input[name="email"]',
                    );
                    if (!button || !emailInput) {
                        return;
                    }
                    button.addEventListener("click", function (event) {
                        const loginHint = (emailInput.value || "").trim();
                        if (!loginHint) {
                            return;
                        }
                        event.preventDefault();
                        const url = new URL(
                            button.href,
                            window.location.origin,
                        );
                        url.searchParams.set("login_hint", loginHint);
                        window.location.href = url.toString();
                    });
                })();
            </script>
            {% endif %}
        </section>
        <script src="/static/app.js"></script>
    </body>
</html>
