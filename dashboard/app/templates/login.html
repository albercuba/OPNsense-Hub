<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Sign in · OPNsense Hub</title>
        {% if brand_logo_url %}
        <link rel="icon" href="{{ brand_logo_url }}" />
        {% endif %}
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
        />
        <link rel="stylesheet" href="/static/style.css" />
    </head>
    <body class="login">
        <section class="card">
            <h1>
                {% if brand_logo_url %}<img
                    class="login-brand-logo"
                    src="{{ brand_logo_url }}"
                    alt="OPNsense Hub logo"
                />{% else %}<i class="fa-solid fa-shield-halved brand-mark"></i
                >{% endif %} OPNsense Hub
            </h1>
            {% if error %}
            <div class="card warning">{{ error }}</div>
            {% endif %}
            <form
                action="/api/v1/auth/login"
                method="post"
                class="settings-form narrow-form"
            >
                <label class="form-row"
                    >Email or username
                    <input name="email" type="text" required autofocus
                /></label>
                <label class="form-row"
                    >Password <input name="password" type="password" required
                /></label>
                <div class="login-actions">
                    <button class="button" type="submit">
                        <i class="fa-solid fa-right-to-bracket"></i> Sign in
                    </button>
                    {% if local_ad_login_enabled %}
                    <button
                        class="button secondary"
                        type="submit"
                        formaction="/auth/local-ad"
                    >
                        <i class="fa-solid fa-building-columns"></i> Sign in
                        with Local AD
                    </button>
                    {% endif %}
                </div>
            </form>
            {% if microsoft_login_enabled %}
            <div class="login-separator"><span>or</span></div>
            <div class="login-external-action">
                <a
                    class="button secondary"
                    id="microsoft-login-button"
                    href="/auth/microsoft/start"
                >
                    <i class="fa-brands fa-microsoft"></i> Sign in with
                    Microsoft 365
                </a>
            </div>
            {% endif %}
        </section>
    </body>
</html>
