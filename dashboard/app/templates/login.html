<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Sign in · OPNsense Hub</title>
        {% if brand_logo_url %}
        <link rel="icon" href="{{ brand_logo_url }}" />
        {% endif %}
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
        />
        <link rel="stylesheet" href="/static/style.css" />
    </head>
    <body class="login">
        <section class="card">
            <h1>
                {% if brand_logo_url %}<img
                    class="login-brand-logo"
                    src="{{ brand_logo_url }}"
                    alt="OPNsense Hub logo"
                />{% else %}<i class="fa-solid fa-shield-halved brand-mark"></i
                >{% endif %} OPNsense Hub
            </h1>
            <p class="muted">Sign in to manage enrolled firewalls.</p>
            {% if error %}
            <div class="card warning">{{ error }}</div>
            {% endif %}
            <form
                action="/api/v1/auth/login"
                method="post"
                class="settings-form narrow-form"
            >
                <label class="form-row"
                    >Email or username
                    <input name="email" type="text" required autofocus
                /></label>
                <label class="form-row"
                    >Password <input name="password" type="password" required
                /></label>
                <div class="login-actions">
                    <button class="button" type="submit">
                        <i class="fa-solid fa-right-to-bracket"></i> Sign in
                    </button>
                    {% if local_ad_login_enabled %}
                    <button
                        class="button secondary"
                        type="submit"
                        formaction="/auth/local-ad"
                    >
                        <i class="fa-solid fa-building-columns"></i> Sign in
                        with Local AD
                    </button>
                    {% endif %}
                </div>
            </form>
            {% if microsoft_login_enabled %}
            <div class="login-separator"><span>or</span></div>
            <button
                class="button secondary"
                type="button"
                id="microsoft-login-button"
                data-client-id="{{ microsoft_client_id or '' }}"
                data-authority="{{ microsoft_authority_url or '' }}"
                data-scope="{{ microsoft_access_scope or '' }}"
            >
                <i class="fa-brands fa-microsoft"></i> Sign in with Microsoft
                365
            </button>
            <script src="https://alcdn.msauth.net/browser/2.38.3/js/msal-browser.min.js"></script>
            <script>
                (function () {
                    const button = document.getElementById(
                        "microsoft-login-button",
                    );
                    if (!button || !window.msal) {
                        return;
                    }
                    button.addEventListener("click", async function () {
                        const clientId = button.dataset.clientId || "";
                        const authority = button.dataset.authority || "";
                        const scope = button.dataset.scope || "";
                        if (!clientId || !authority || !scope) {
                            return;
                        }
                        button.disabled = true;
                        try {
                            const app = new window.msal.PublicClientApplication(
                                {
                                    auth: {
                                        clientId,
                                        authority,
                                        redirectUri:
                                            window.location.origin + "/login",
                                    },
                                    cache: {
                                        cacheLocation: "sessionStorage",
                                    },
                                },
                            );
                            await app.initialize();
                            const loginRequest = {
                                scopes: ["openid", "profile", "email", scope],
                                prompt: "select_account",
                            };
                            const loginResult =
                                await app.loginPopup(loginRequest);
                            const account =
                                loginResult.account || app.getAllAccounts()[0];
                            const tokenResult = await app.acquireTokenSilent({
                                scopes: [scope],
                                account,
                            });
                            const response = await fetch("/auth/microsoft", {
                                method: "POST",
                                headers: {
                                    "Content-Type":
                                        "application/x-www-form-urlencoded",
                                    Accept: "application/json",
                                },
                                body: new URLSearchParams({
                                    token: tokenResult.accessToken,
                                }),
                                credentials: "same-origin",
                            });
                            if (!response.ok) {
                                const payload = await response
                                    .json()
                                    .catch(() => null);
                                throw new Error(
                                    payload && payload.detail
                                        ? payload.detail
                                        : "Microsoft sign-in failed",
                                );
                            }
                            const payload = await response.json();
                            window.location.href =
                                payload.redirect || "/dashboard";
                        } catch (error) {
                            window.alert(
                                error && error.message
                                    ? error.message
                                    : "Microsoft sign-in failed",
                            );
                            button.disabled = false;
                        }
                    });
                })();
            </script>
            {% endif %}
        </section>
    </body>
</html>
