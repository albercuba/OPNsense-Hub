services:
  opnsense-hub-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: opnsensehub
      POSTGRES_USER: opnsensehub
      POSTGRES_PASSWORD: opnsensehub
    volumes:
      - opnsense_hub_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opnsensehub -d opnsensehub"]
      interval: 10s
      timeout: 5s
      retries: 5

  opnsense-hub-api:
    build: ./dashboard
    env_file: .env
    depends_on:
      opnsense-hub-db:
        condition: service_healthy
    ports:
      - "8083:8083"
      - "51820:51820/udp"
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - opnsense_hub_wg:/etc/wireguard
      - opnsense_hub_branding:/var/lib/opnsense-hub/branding

  opnsense-hub-web:
    build: ./dashboard
    env_file: .env
    depends_on:
      opnsense-hub-db:
        condition: service_healthy
    profiles: ["split-services"]
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8083"]
    volumes:
      - opnsense_hub_branding:/var/lib/opnsense-hub/branding

  opnsense-hub-proxy:
    image: caddy:2-alpine
    profiles: ["reverse-proxy"]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - opnsense_hub_caddy:/data

volumes:
  opnsense_hub_db:
  opnsense_hub_wg:
  opnsense_hub_branding:
  opnsense_hub_caddy:
